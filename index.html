<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Ruleta del Amigo Invisible</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="contenedor">

        <div class="regalo">🎁</div>

        <h1>Amigo Invisible</h1>

        <p class="subtitulo">
            Selecciona tu nombre y gira la ruleta para descubrir
            quién te tocó.
        </p>

        <div class="ruleta-contenedor">

            <div class="flecha"></div>

            <div id="ruleta" class="ruleta">

                <div class="separador separador-1"></div>
                <div class="separador separador-2"></div>
                <div class="separador separador-3"></div>
                <div class="separador separador-4"></div>
                <div class="separador separador-5"></div>
                <div class="separador separador-6"></div>
                <div class="separador separador-7"></div>

                <div class="centro-ruleta">
                    🎲
                </div>

            </div>

        </div>

        <label for="personaSelect">
            Selecciona tu nombre
        </label>

        <select id="personaSelect">

            <option value="">
                -- Selecciona tu nombre --
            </option>

            <option value="Luján">Luján</option>
            <option value="Luz">Luz</option>
            <option value="Emelyn">Emelyn</option>
            <option value="Luna">Luna</option>
            <option value="Marcos">Marcos</option>
            <option value="Kevin">Kevin</option>
            <option value="Ale">Ale</option>

        </select>

        <button id="girarBtn">
            🎡 Girar la ruleta
        </button>

        <p id="mensaje" class="mensaje"></p>

    </main>

    <div id="modal" class="modal oculto">

        <div class="modal-contenido">

            <div class="icono-modal">
                🎉
            </div>

            <p class="texto-resultado">
                Tu amigo invisible es:
            </p>

            <h2 id="resultado"></h2>

            <p class="aviso">
                Guarda el secreto y no muestres este resultado.
            </p>

            <button id="cerrarBtn">
                Cerrar
            </button>

        </div>

    </div>

    <script src="script.js?v=30"></script>

</body>
</html>
